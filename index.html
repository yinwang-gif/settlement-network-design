  return crypto.subtle.deriveKey({name:'PBKDF2', salt:b64ToBytes(saltB64), iterations, hash:'SHA-256'}, baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function decryptPage(password){
  const key = await deriveKey(password);
  const data = b64ToBytes(encryptedPayload);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64ToBytes(ivB64), tagLength:128}, key, data);
  return new TextDecoder().decode(plain);
}
document.getElementById('unlockForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const err = document.getElementById('error');
  const loading = document.getElementById('loading');
  const btn = document.getElementById('unlockBtn');
  err.style.display='none'; loading.style.display='block'; btn.disabled=true;
  try{
    const html = await decryptPage(document.getElementById('password').value);
    document.open(); document.write(html); document.close();
  }catch(ex){
    loading.style.display='none'; err.style.display='block'; btn.disabled=false;
  }
});
